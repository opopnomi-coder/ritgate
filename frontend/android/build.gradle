// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
  // Redirect subproject build dirs to short path to avoid Windows 260-char MAX_PATH limit
  // Root project (MyGate) must keep default build dir - autolinking.json is written there by ReactSettingsPlugin
  if (project != rootProject) {
    layout.buildDirectory = file("C:/rb/MyGate/${project.name}")
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
